<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<!-- Site-level favicon (the global default). A presentation overrides it from
		     its +layout.svelte, and a page from its pages.ts entry — last one wins. -->
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		%sveltekit.head%

		<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap" rel="stylesheet">
		<link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">
		<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
	</head>
	<style>

	</style>
	<body data-sveltekit-preload-data="hover">
		<!-- Looking for the slide's text and not finding it? That is expected, not a broken
		     server or build. SlideDeck gates SSR, so this document is only a shell — slides
		     render on the client, and no page's HTML ever contains its own content.
		     To check a slide without a browser: fetch the module the dev server compiles
		     (/src/routes/<deck>/<name>.html/+page.svelte), or run `pnpm test`, whose
		     tests/*.ssr.test.ts project renders through svelte/server and is the real proof. -->
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
